<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Button Test</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
    .card { background: white; padding: 16px; border-radius: 10px; max-width: 500px; margin: 40px auto; }
    button { width: 100%; padding: 14px; margin-top: 10px; }
    #msg { margin-top: 12px; font-size: 18px; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Button Test</h2>
    <button id="testBtn" type="button">Press me</button>
    <div id="msg">Page loaded.</div>
  </div>

  <script>
    document.getElementById("testBtn").addEventListener("click", function () {
      document.getElementById("msg").textContent = "Button works.";
      alert("Button works");
    });
  </script>
</body>
</html>
