<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meal Planner</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { font-family: Arial; margin:0; background:#f5f5f5;}
.wrap { max-width:700px; margin:auto; padding:10px;}
.card { background:white; padding:12px; margin:10px 0; border-radius:10px;}
input, select, button { width:100%; padding:10px; margin-top:5px;}
button { border:none; border-radius:8px; cursor:pointer;}
.tag { display:inline-block; padding:4px 8px; margin:3px; border-radius:999px; font-size:12px; background:#eee;}
.low { background:#d1fae5;}
.medium { background:#fef3c7;}
.high { background:#fee2e2;}
.hidden { display:none;}
.small { font-size:12px;}
.actions { margin-top:8px; display:flex; gap:6px;}
.actions button { flex:1;}
</style>
</head>

<body>
<div class="wrap">

<!-- LOGIN -->
<div id="loginBox" class="card">
<h3>Login</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button id="loginBtn">Login</button>
<div id="msg"></div>
</div>

<!-- APP -->
<div id="app" class="hidden">

<div class="card">
<h3>Add / Edit Meal</h3>

<input id="title" placeholder="Meal name">

<select id="cost">
<option value="low">Low</option>
<option value="medium">Medium</option>
<option value="high">High</option>
</select>

<input id="tagInput" placeholder="Tag">
<button id="addTagBtn">Add Tag</button>
<div id="tags"></div>

<input id="ingredientInput" placeholder="Ingredient">
<button id="addIngredientBtn">Add Ingredient</button>
<div id="ingredients"></div>

<button id="saveMealBtn">Save Meal</button>
<button id="cancelEditBtn" class="hidden">Cancel Edit</button>

</div>

<div class="card">
<h3>Meals</h3>
<div id="mealList"></div>
</div>

</div>

</div>

<script>
const supabase = window.supabase.createClient(
"https://njhgiitbtvsbudarsmbk.supabase.co",
"sb_publishable_AHbuYoScuVzZ6jgAkQMMpg_eZRPn6v0"
);

// STATE
let tags = [];
let ingredients = [];
let meals = [];
let editingId = null;

// ELEMENTS
const loginBox = document.getElementById("loginBox");
const app = document.getElementById("app");
const msg = document.getElementById("msg");

const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");

const titleInput = document.getElementById("title");
const costInput = document.getElementById("cost");

const tagInput = document.getElementById("tagInput");
const ingredientInput = document.getElementById("ingredientInput");

const tagsDiv = document.getElementById("tags");
const ingredientsDiv = document.getElementById("ingredients");

const mealList = document.getElementById("mealList");

const saveBtn = document.getElementById("saveMealBtn");
const cancelEditBtn = document.getElementById("cancelEditBtn");

// LOGIN
document.getElementById("loginBtn").addEventListener("click", async () => {
  const { error } = await supabase.auth.signInWithPassword({
    email: emailInput.value,
    password: passwordInput.value
  });

  if (error) {
    msg.textContent = error.message;
    return;
  }

  loginBox.classList.add("hidden");
  app.classList.remove("hidden");
  loadMeals();
});

// TAGS
document.getElementById("addTagBtn").addEventListener("click", () => {
  if (!tagInput.value) return;
  if (tags.length >= 2) {
    alert("Max 2 tags");
    return;
  }
  tags.push(tagInput.value);
  tagInput.value = "";
  renderTags();
});

function renderTags() {
  tagsDiv.innerHTML = "";
  tags.forEach((t, i) => {
    tagsDiv.innerHTML += `<span class="tag">${t} <button onclick="removeTag(${i})">x</button></span>`;
  });
}

window.removeTag = function(i) {
  tags.splice(i,1);
  renderTags();
}

// INGREDIENTS
document.getElementById("addIngredientBtn").addEventListener("click", () => {
  if (!ingredientInput.value) return;
  ingredients.push(ingredientInput.value);
  ingredientInput.value = "";
  renderIngredients();
});

function renderIngredients() {
  ingredientsDiv.innerHTML = "";
  ingredients.forEach((ing, i) => {
    ingredientsDiv.innerHTML += `<span class="tag">${ing} <button onclick="removeIngredient(${i})">x</button></span>`;
  });
}

window.removeIngredient = function(i) {
  ingredients.splice(i,1);
  renderIngredients();
}

// SAVE
saveBtn.addEventListener("click", async () => {
  const data = {
    title: titleInput.value,
    cost_band: costInput.value,
    tags: tags,
    ingredients: ingredients
  };

  if (!data.title || ingredients.length === 0) {
    alert("Add title and ingredients");
    return;
  }

  if (editingId) {
    await supabase.from("meals").update(data).eq("id", editingId);
  } else {
    await supabase.from("meals").insert(data);
  }

  resetForm();
  loadMeals();
});

// LOAD
async function loadMeals() {
  const { data } = await supabase.from("meals").select("*").order("created_at", {ascending:false});
  meals = data || [];
  renderMeals();
}

// RENDER
function renderMeals() {
  mealList.innerHTML = "";

  meals.forEach(m => {
    mealList.innerHTML += `
    <div class="card">
      <b>${m.title}</b><br>
      <span class="tag ${m.cost_band}">${m.cost_band}</span>
      ${(m.tags||[]).map(t=>`<span class="tag">${t}</span>`).join("")}
      <div class="small">${(m.ingredients||[]).join(", ")}</div>

      <div class="actions">
        <button onclick="editMeal('${m.id}')">Edit</button>
        <button onclick="deleteMeal('${m.id}')">Delete</button>
      </div>
    </div>
    `;
  });
}

// EDIT
window.editMeal = function(id) {
  const m = meals.find(x => x.id == id);
  if (!m) return;

  editingId = id;
  titleInput.value = m.title;
  costInput.value = m.cost_band;
  tags = [...(m.tags||[])];
  ingredients = [...(m.ingredients||[])];

  renderTags();
  renderIngredients();

  cancelEditBtn.classList.remove("hidden");
}

// CANCEL EDIT
cancelEditBtn.addEventListener("click", resetForm);

// DELETE
window.deleteMeal = async function(id) {
  if (!confirm("Delete meal?")) return;
  await supabase.from("meals").delete().eq("id", id);
  loadMeals();
};

// RESET
function resetForm() {
  titleInput.value = "";
  tags = [];
  ingredients = [];
  editingId = null;

  renderTags();
  renderIngredients();

  cancelEditBtn.classList.add("hidden");
}
</script>

</body>
</html>
