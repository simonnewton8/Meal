<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supabase Login Test</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
    .card { background: white; padding: 16px; border-radius: 10px; max-width: 500px; margin: 40px auto; }
    input, button { width: 100%; padding: 12px; margin-top: 10px; box-sizing: border-box; }
    .msg { margin-top: 12px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Supabase Login Test</h2>

    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button id="loginBtn">Login</button>

    <div id="msg" class="msg"></div>
  </div>

  <script>
    const SUPABASE_URL = "https://njhgiitbtvsbudarsmbk.supabase.co";
    const SUPABASE_KEY = "sb_publishable_AHbuYoScuVzZ6jgAkQMMpg_eZRPn6v0";

    const msg = document.getElementById("msg");

    let supabase;

    try {
      supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      msg.textContent = "Supabase client created.";
    } catch (err) {
      msg.textContent = "Failed to create Supabase client:\n" + err.message;
    }

    document.getElementById("loginBtn").addEventListener("click", async () => {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      if (!email || !password) {
        msg.textContent = "Enter email and password.";
        return;
      }

      msg.textContent = "Trying login...";

      try {
        const { data, error } = await supabase.auth.signInWithPassword({
          email,
          password
        });

        if (error) {
          msg.textContent = "Login failed:\n" + error.message;
          return;
        }

        msg.textContent = "Login worked.\nUser: " + (data.user?.email || "unknown");
      } catch (err) {
        msg.textContent = "Connection/app error:\n" + err.message;
      }
    });
  </script>
</body>
</html>
